name: policy_training
params:
  steps: 100000
  batch_size: 256
  lr: 1.0e-4
  ema_decay: 0.9999
  n_sample_steps: 100
  device: cuda
  seed: 0
  amp: false          # bf16 autocast on loss + sampling (no grad scaler needed)
  workers: 0          # DataLoader workers, used ONLY when the dataset sets supports_fast_path=False
                      # (e.g. an out-of-RAM image dataset). The in-RAM index path never builds one.
