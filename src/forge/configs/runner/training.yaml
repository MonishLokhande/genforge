name: training
params:
  steps: 2000
  batch_size: 256
  grad_accum: 1        # micro-batches summed per optimizer step; effective batch = batch_size*grad_accum
  lr: 1.0e-3
  optimizer: adamw     # adamw (decoupled decay) | adam (coupled L2); else → register your own runner
  weight_decay: 0.0    # adamw decouples this from the adaptive step; adam folds it into the gradient
  decay_1d: true       # decay 1-D params (biases, LayerNorm gains) too; false → nanoGPT-style exclusion
  betas: [0.9, 0.999]  # Adam/AdamW moments; transformer training usually wants beta2≈0.95
  warmup_steps: 0      # linear LR warmup before the schedule (transformers usually need it); 0 = off
  ema_decay: 0.999
  n_sample_steps: 100
  n_eval_samples: 2000
  eval_radius: 0.6
  val_frac: 0.0        # held-out fraction; 0 = no split (train uses all items; byte-identical)
  val_every: 0         # steps between held-out val-loss passes (0 = off)
  eval_every: 0        # steps between full evaluate() sample+metrics (0 = off)
  save_best: false     # keep <ckpt>.best.pt (+ .best.metrics.json) at the lowest val_loss
  device: cpu
  seed: 0
  amp: false          # bf16 autocast on loss + sampling (no grad scaler needed); CUDA and CPU
  compile: false      # opt-in torch.compile of the training-forward path; raw model kept for EMA/ckpt
  workers: 0          # DataLoader workers, used ONLY by datasets that set supports_fast_path=False
                      # (e.g. an out-of-RAM image dataset). The default in-RAM index path ignores
                      # this and never builds a loader.
  # Optional experiment logging — needs the `logging` extra (pip install genforge[logging]).
  # Absent/false => no-op logger + plain loop; a default run is unchanged. Any runner accepts
  # these via CLI too, e.g. runner.params.log.wandb=true (or env FORGE_WANDB=1).
  log:
    wandb: false      # off by default; no wandb import, no login prompt
    project: forge
    mode: null        # online | offline | disabled
    name: null        # run name; defaults to <method>-<steps>steps
    progress: false   # tqdm bar; plain loop if tqdm absent or stderr is non-TTY
