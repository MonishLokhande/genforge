# @package _global_
# SEDD (Lou et al.) — CODE-FIRST: concrete-score + denoising score-entropy (method=sedd) + the
# score-based reverse (sampler=sedd), on the ABSORBING graph with EXACT per-target weighting read
# from schedule.rate_matrix(t). vocab=32 (31 chars + mask=31).
defaults:
  - /space: discrete
  - /schedule: absorbing
  - /model: transformer
  - /method: sedd
  - /sampler: sedd
  - /runner: training
  - /visualizer: env_render      # decode generated tokens → a readable samples.txt (via env.visualize)
  - _self_

plugins:
  - examples          # the moved method/sampler/schedule/model/... implementations
  - envs.text

space:
  params: {num_classes: 32, length: 32, mask_index: 31}
schedule:
  params: {num_classes: 32}
model:
  params: {vocab_size: 32, length: 32, d_model: 128, depth: 4, n_heads: 4, output_type: concrete_score}
environment:
  name: char_text
  params: {length: 32, repeat: 8}
dataset:
  name: distribution
  params: {n_samples: 4000, seed: 0}
runner:
  params:
    steps: 3000
    batch_size: 64
    lr: 3.0e-4
    lr_schedule: cosine
    ema_decay: 0.999
    n_sample_steps: 64
    n_eval_samples: 256
    device: cpu
    seed: 0
    ckpt_path: checkpoints/text/char/sedd/model.pt
