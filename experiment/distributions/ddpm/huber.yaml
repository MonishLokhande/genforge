# @package _global_
# Worked example: the exact DDPM recipe, but with a Huber loss instead of MSE.
# The ONLY change is the criterion — method/schedule/model/sampler/runner are all inherited unchanged.
# (Huber is no longer a bespoke method: DDPM reduces through the injected `criterion`.)
defaults:
  - /experiment/distributions/ddpm/base
  - /criterion: huber
  - _self_

runner:
  params:
    ckpt_path: checkpoints/distributions/ddpm/huber.pt
