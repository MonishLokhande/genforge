# @package _global_
# Phase 6: train the amortized value model (reward toward the +2 mode). Writes a value checkpoint.
defaults:
  - /space: euclidean
  - /schedule: vp_linear
  - /model: value_mlp
  - /method: value_training
  - /sampler: ddpm
  - /runner: value_training
  - _self_

plugins:
  - envs.distributions

environment:
  name: gaussian_mixture
  params: {means: [[-2.0, 0.0], [2.0, 0.0]], std: 0.2}
dataset:
  name: distribution
  params: {n_samples: 20000, seed: 0}
runner:
  params:
    steps: 2000
    ckpt_path: checkpoints/distributions/value/values.pt
