# @package _global_
# walker2d-medium-v2 on the 4-slot attention-capable temporal U-Net (attention=false) with the
# vp_cosine schedule the trained locomotion checkpoints were trained under.
#
# Distinct from this dir's ddpm.yaml: that leaf is the 3-slot temporal_unet_janner under
# vp_linear, and its ckpt_path is a DIFFERENT architecture — the two are not interchangeable.
defaults:
  - /experiment/robotics/locomotion/base
  - override /schedule: vp_cosine
  - _self_

obs_dim: 17
action_dim: 6

# plugins lists REPLACE (yaml), so restate the base env plugin alongside the model plugin
plugins:
  - examples          # the moved method/sampler/schedule/model/... implementations
  - envs.robotics.locomotion
  - experiment.robotics.locomotion

environment:
  params:
    name: walker2d-medium-v2

# attention_unet is a plugin class (registered by experiment.robotics.locomotion above); select it
# inline by name — overrides the base's temporal_unet_janner. dim/dim_mults/horizon/output_type
# come from the base's inline model.params (identical values), so only the deltas live here.
model:
  name: attention_unet
  params:
    transition_dim: 23   # action_dim(6) + obs_dim(17)
    attention: false     # matches the trained checkpoint (class default too, kept explicit)

runner:
  params:
    ckpt_path: checkpoints/robotics/locomotion/walker2d/attention_ddpm.pt
