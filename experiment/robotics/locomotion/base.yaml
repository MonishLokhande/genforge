# @package _global_
# Tier A locomotion diffuser: Janner action-first x=[a|s] trajectory diffusion. Leaves set env
# name + obs_dim/action_dim (hence model.transition_dim) only.
#
# NOT goal-conditioned — this is the one trajectory family that isn't, so it does NOT get maze2d's
# `planning` runner. Diffuser locomotion pins the CURRENT state (pin_positions: [0]) and picks
# among candidates with a learned value head; there is no goal to pin, and `planning` reads
# pins[0]/pins[-1] as (start, goal) — with a single pin those alias, so the goal overwrites the
# start. `training` trains the planner and stops there, which is exactly Diffuser's split: train
# planner -> train value -> eval. The value-guided receding-horizon rollout (the eval that carries
# the real number) lives in experiment/robotics/locomotion/guided_planning.py; it needs a value
# checkpoint this planner recipe never names, so NO in-repo runner drives it — `forge train` here
# reports only `{"n": ...}` (MinariAdapter has no evaluate()), and scoring a locomotion checkpoint
# currently requires an out-of-repo harness that constructs GuidedLocomotionEval itself.
#
# KNOWN BROKEN (measured 2026-07-17): this vp_linear + temporal_unet_janner recipe trains to a
# converged loss and a good DENSITY model (unconditional marginals match the data, pins are honored
# exactly, actions land in range) but the resulting planner CANNOT control the system — hopper
# returns ~4 raw (falls in ~4 steps) vs ~2772 for the vp_cosine + attention_unet leaves in this same
# dir. Ruled out: value-guidance pairing (unguided is equally bad), sampling-step count (20/200/1000
# identical), EMA, conditioning, prior mismatch. Root cause NOT yet found. Use the attention_ddpm
# leaves for locomotion until this is resolved.
defaults:
  - /space: euclidean
  - /schedule: vp_linear
  - /method: conditional
  - /sampler: ddpm
  - /runner: training
  - _self_

plugins:
  - envs.robotics.locomotion

horizon: 32

environment:
  name: minari
  params: {}

dataset:
  name: trajectory_window
  params:
    horizon: ${horizon}
    layout: janner          # x = [action | state]
    include_actions: true
    stride: 1

# Model selected inline (name:), NOT via a `/model` group default, so a leaf can swap the class
# with its own inline `name:` — no repo-root `model/` group leaf, no janner-param leak (the class
# defaults cond_dim/cond_predict_scale/obs_dim = 0/false/0, so they need no restating here).
model:
  name: temporal_unet_janner
  params:
    horizon: ${horizon}
    dim: 32
    dim_mults: [1, 2, 4, 8]
    output_type: x0         # predict_epsilon=False → x_start → x0

method:
  params:
    pin_positions: [0]      # locomotion conditions on the current state only (start pin)

preprocessor:
  name: standardize         # TrajectoryGaussian is just Standardize; standardize is built-in
  params: {}

runner:
  params:
    steps: 1000000
    batch_size: 32
    lr: 2.0e-4
    ema_decay: 0.995
    n_sample_steps: 20
    device: cuda
    seed: 0
    ckpt_path: checkpoints/robotics/locomotion/model.pt
