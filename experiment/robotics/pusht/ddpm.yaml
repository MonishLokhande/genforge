# @package _global_
# Tier B PushT (lowdim keypoints) closed-loop diffusion policy — deltas over the shared tierb_base
# recipe (DDPM on actions only; obs normalized in-model by ObsNormalizer, NOT the membrane — Inv 9).
# Data: lerobot/pusht_keypoints (HF, cached) — 18-d obs (environment_state 16 ⊕ agent_pos 2), 2-d
# action. Rollout: gym_pusht/PushT-v0 with the Dict obs obs_type=environment_state_agent_pos;
# flatten_env_obs maps it back to the 18-d training layout. cond_dim = n_obs_steps(2)*obs_dim(18) = 36.
defaults:
  - /experiment/robotics/tierb_base
  - _self_

plugins:
  - envs.robotics.hf_lowdim

action_dim: 2        # PushT end-effector target (x, y)
obs_dim: 18          # environment_state(16) ⊕ agent_pos(2)

environment:
  name: hf_lowdim
  params:
    name: lerobot/pusht_keypoints
    obs_keys:
      - observation.environment_state
      - observation.state

model:
  params:
    cond_dim: ${mul:${n_obs_steps},${obs_dim}}   # 2 * 18 = 36
    obs_dim: ${mul:${n_obs_steps},${obs_dim}}    # = cond_dim; in-model ObsNormalizer sees full history

runner:
  params:
    max_episode_steps: 300
    success_threshold: 0.95   # dp PushT success = max coverage >= 0.95
    ckpt_path: checkpoints/robotics/pusht/ddpm.pt
